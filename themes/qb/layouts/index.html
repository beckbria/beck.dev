{{ define "main" }}
<div class="home-container">
  <h1>{{ .Title | default .Site.Title }}</h1>
  <div class="home-content">
    {{ .Content }}
  </div>

  <h2>Recent Files</h2>
  <ul class="post-list">
    {{ range first 10 .Site.RegularPages }}
    <li>
      <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
      <a href="{{ .Permalink }}" class="post-link">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>

  {{ end }} -->
</div>
{{ end }}
