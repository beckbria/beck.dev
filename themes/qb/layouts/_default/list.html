{{ define "main" }}
<div class="list-container">
  <h1>Directory of {{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages }}
      <li>
        <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
        <a href="{{ .Permalink }}" class="post-link">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
</div>
{{ end }}
