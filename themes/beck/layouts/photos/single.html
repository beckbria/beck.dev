{{ define "main" }}
<article class="max-w-4xl mx-auto">
    <div class="mb-8 rounded overflow-hidden shadow-lg bg-gray-200">
        <!-- Photo image goes here -->
        <div class="w-full aspect-video flex items-center justify-center text-gray-500">
            [High-Res Photo Display]
        </div>
    </div>
    
    <h1 class="text-3xl font-bold mb-2">{{ .Title }}</h1>
    <div class="text-sm text-gray-500 mb-6">
        {{ if .Params.location }}<span class="mr-4">📍 {{ .Params.location }}</span>{{ end }}
        {{ if .Params.date }}<span>📅 {{ .Date.Format "Jan 2, 2006" }}</span>{{ end }}
    </div>
    
    <div class="prose max-w-none">
        {{ .Content }}
    </div>
</article>
{{ end }}
