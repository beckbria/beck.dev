<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beck.dev - Travel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #1a1a1a;
            --text-muted: #555555;
            --accent-swe: #0366d6;
            --border-color: #e1e4e8;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --text-color: #c9d1d9;
                --text-muted: #8b949e;
                --accent-swe: #58a6ff;
                --border-color: #30363d;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            transition: background-color 0.3s, color 0.3s;
        }

        a { color: var(--accent-swe); text-decoration: none; }
        a:hover { text-decoration: underline; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        nav a { margin-left: 1rem; font-weight: 500; color: var(--text-color); }
        
        #map { height: 500px; border-radius: 8px; margin-bottom: 3rem; z-index: 1; }
    </style>
</head>
<body>
    <header>
        <h1><a href="mockup_home.html" style="color: var(--text-color)">beck.dev</a></h1>
        <nav>
            <a href="#">Blog</a>
            <a href="#">Photos</a>
            <a href="#">Projects</a>
            <a href="mockup_travel.html" style="font-weight: bold; color: var(--accent-swe);">Travel</a>
        </nav>
    </header>

    <main>
        <h2>Where I've Been</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">A map of locations I've visited and photographed. Click on a marker to view photos from that area.</p>
        <div id="map"></div>
    </main>

    <script>
        // Initialize Leaflet Map
        var map = L.map('map').setView([37.8, -96], 4);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Mock data for locations - linking directly to photo tags
        var locations = [
            { "lat": 37.7749, "lng": -122.4194, "title": "San Francisco", "url": "/photos/tags/san-francisco/" },
            { "lat": 40.7128, "lng": -74.0060, "title": "New York City", "url": "/photos/tags/new-york/" },
            { "lat": 47.6062, "lng": -122.3321, "title": "Seattle", "url": "/photos/tags/seattle/" },
            { "lat": 37.8651, "lng": -119.5383, "title": "Yosemite National Park", "url": "/photos/tags/yosemite/" }
        ];

        locations.forEach(loc => {
            var popupContent = '<b>' + loc.title + '</b><br><a href="' + loc.url + '">View photos from ' + loc.title + ' &rarr;</a>';
            L.marker([loc.lat, loc.lng]).addTo(map)
                .bindPopup(popupContent);
        });
    </script>
</body>
</html>
